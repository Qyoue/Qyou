name: Mobile CI

on:
  push:
  pull_request:

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w @qyou/mobile

      - name: Test
        run: npm run test -w @qyou/mobile
