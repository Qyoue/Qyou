name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck
        run: npm run typecheck -w @qyou/api

      - name: Lint
        run: npm run lint -w @qyou/api

      - name: Test
        run: npm run test -w @qyou/api

      - name: Build
        run: npm run build -w @qyou/api
